apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: slugapp-hpa
  namespace: slugapi-ns
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: slugapp
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 30
